<!DOCTYPE html>
<html>

<head>

<title>AgriMart Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="container">

<div class="form-container">

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="error-msg">
            {{ messages[0] }}
        </div>
    {% endif %}
{% endwith %}    
    

<!-- LOGIN FORM -->

<div class="form-box login" id="loginForm">

<h2>Login</h2> 

<form method="POST" action="/login">    

<input type="text" name="name" placeholder="Name" required>  

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>       

<button class="switch-btn" onclick="showRegister()">Register</button>

</div>


<!-- REGISTER FORM -->

<div class="form-box register" id="registerForm" style="display:none;">

<h2>Register</h2>

<form method="POST" action="/register">

<input type="text" name="name" placeholder="Name" required>

<input type="password" name="password" placeholder="Password" required>

<input type="text" name="address" placeholder="Address" required>

<input type="text" name="contact" placeholder="Contact Number" required>

<select name="role" required>

<option value="">Select Role</option>

<option value="farmer">Farmer</option>

<option value="consumer">Consumer</option>

</select>

<button type="submit">Register</button>

</form>

<p>Already have an account?</p>

<button class="switch-btn" onclick="showLogin()">Login</button>

</div>

</div>

</div>


<script>

function showRegister(){

document.getElementById("loginForm").style.display = "none";
document.getElementById("registerForm").style.display = "block";

}

function showLogin(){

document.getElementById("loginForm").style.display = "block";
document.getElementById("registerForm").style.display = "none";

}

</script>

</body>

</html>
